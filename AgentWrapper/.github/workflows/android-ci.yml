name: AgentWrapper - Android CI

on:
  push:
    branches: [main, "feat/agentwrapper-**"]
    paths:
      - "AgentWrapper/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "AgentWrapper/**"
      - ".github/workflows/android-ci.yml"

jobs:
  build:
    name: lint + test + apk debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AgentWrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create . --org com.misc --project-name agent_wrapper --platforms=android

      - name: Resolve dependencies
        run: flutter pub get

      - name: Codegen (drift, freezed, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter expanded

      - name: Build debug APK
        run: flutter build apk --debug
