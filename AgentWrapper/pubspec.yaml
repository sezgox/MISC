name: agent_wrapper
description: AgentWrapper - cliente movil premium para usar agentes CLI remotos por SSH (Codex, Cursor, Claude, ...).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Modeling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # SSH (pure Dart) + terminal
  dartssh2: ^2.10.0
  xterm: ^4.0.0

  # Persistence (Drift / SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Markdown / code rendering
  flutter_markdown: ^0.7.3
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # Diff rendering
  diff_match_patch: ^0.4.1

  # Misc UX
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  qr_flutter: ^4.1.0

  # Logging
  logger: ^2.3.0

  # Functional helpers
  collection: ^1.18.0
  intl: ^0.20.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lints
  very_good_analysis: ^6.0.0

  # Codegen
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
