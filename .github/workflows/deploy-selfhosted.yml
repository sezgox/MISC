# Self-hosted deploy: after checkout, .env files are created from repo Secrets (not committed).
#
# Create these in GitHub → Settings → Secrets and variables → Actions → Secrets:
#
#   DEPLOY_ENV_VIAJECHAVALES
#     Full file content for ViajeChavales/.env (see ViajeChavales/.env.example).
#     Must include: APP_PORT, POSTGRES_*, JWT_*, optional CLOUDFLARE_PUBLIC_HOSTNAME.
#
#   DEPLOY_ENV_GAEL_GAMES
#     Full file for Gael-Games/.env (APP_PORT, CLOUDFLARE_PUBLIC_HOSTNAME).
#
#   DEPLOY_ENV_PORTFOLIO
#     Full file for Portfolio/.env (APP_PORT, CLOUDFLARE_PUBLIC_HOSTNAME,
#     PUBLIC_ABSTRACT_EMAIL_REPUTATION_API_KEY if you use that build-arg).
#
#   DEPLOY_ENV_CLOUDFLARE_TUNNEL
#     Full file for infra/cloudflare-tunnel/.env — typically one line:
#     CLOUDFLARED_TUNNEL_TOKEN=...
#
# Jobs that run deploy-cloudflare-tunnel.sh need DEPLOY_ENV_CLOUDFLARE_TUNNEL set.

name: Deploy Changed Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      via_front: ${{ steps.filter.outputs.via_front }}
      via_back: ${{ steps.filter.outputs.via_back }}
      via_gateway: ${{ steps.filter.outputs.via_gateway }}
      via_stack: ${{ steps.filter.outputs.via_stack }}
      via_tunnel: ${{ steps.filter.outputs.via_tunnel }}
      gael_front: ${{ steps.filter.outputs.gael_front }}
      gael_gateway: ${{ steps.filter.outputs.gael_gateway }}
      gael_stack: ${{ steps.filter.outputs.gael_stack }}
      gael_tunnel: ${{ steps.filter.outputs.gael_tunnel }}
      port_front: ${{ steps.filter.outputs.port_front }}
      port_gateway: ${{ steps.filter.outputs.port_gateway }}
      port_stack: ${{ steps.filter.outputs.port_stack }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            via_front:
              - 'ViajeChavales/viaje-chavales-front/**'
            via_back:
              - 'ViajeChavales/viaje-chavales-back/**'
            via_gateway:
              - 'ViajeChavales/infra/nginx/**'
              - 'landing/**'
            via_stack:
              - 'ViajeChavales/docker-compose.yml'
              - 'ViajeChavales/scripts/**'
            via_tunnel:
              - 'ViajeChavales/docs/cloudflare-tunnel.md'
              - 'ViajeChavales/docs/deployment.md'
              - 'infra/cloudflare-tunnel/**'
              - 'scripts/deploy-cloudflare-tunnel.sh'
              - 'scripts/deploy-cloudflare-tunnel.ps1'
              - 'scripts/ensure-devogs-edge-network.sh'
              - 'scripts/ensure-devogs-edge-network.ps1'
            gael_front:
              - 'Gael-Games/src/**'
              - 'Gael-Games/public/**'
              - 'Gael-Games/index.html'
              - 'Gael-Games/package.json'
              - 'Gael-Games/package-lock.json'
              - 'Gael-Games/vite.config.js'
            gael_gateway:
              - 'Gael-Games/infra/nginx/**'
            gael_stack:
              - 'Gael-Games/docker-compose.yml'
              - 'Gael-Games/Dockerfile.frontend'
              - 'Gael-Games/.env.example'
              - 'Gael-Games/init-app'
              - 'Gael-Games/init-app.ps1'
              - 'Gael-Games/scripts/**'
            gael_tunnel:
              - 'Gael-Games/docs/cloudflare-tunnel.md'
              - 'Gael-Games/docs/deployment.md'
            port_front:
              - 'Portfolio/src/**'
              - 'Portfolio/public/**'
              - 'Portfolio/package.json'
              - 'Portfolio/package-lock.json'
              - 'Portfolio/astro.config.mjs'
              - 'Portfolio/tailwind.config.mjs'
              - 'Portfolio/tsconfig.json'
            port_gateway:
              - 'Portfolio/infra/nginx/**'
            port_stack:
              - 'Portfolio/docker-compose.yml'
              - 'Portfolio/Dockerfile'
              - 'Portfolio/.env.example'
              - 'Portfolio/init-app'
              - 'Portfolio/init-app.ps1'
              - 'Portfolio/scripts/**'

  teardown-selfhosted:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.via_front == 'true' ||
      needs.detect-changes.outputs.via_back == 'true' ||
      needs.detect-changes.outputs.via_gateway == 'true' ||
      needs.detect-changes.outputs.via_stack == 'true' ||
      needs.detect-changes.outputs.via_tunnel == 'true' ||
      needs.detect-changes.outputs.gael_front == 'true' ||
      needs.detect-changes.outputs.gael_gateway == 'true' ||
      needs.detect-changes.outputs.gael_stack == 'true' ||
      needs.detect-changes.outputs.gael_tunnel == 'true' ||
      needs.detect-changes.outputs.port_front == 'true' ||
      needs.detect-changes.outputs.port_gateway == 'true' ||
      needs.detect-changes.outputs.port_stack == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env files from secrets (for teardown)
        env:
          VIA: ${{ secrets.DEPLOY_ENV_VIAJECHAVALES }}
          GAEL: ${{ secrets.DEPLOY_ENV_GAEL_GAMES }}
          PORT: ${{ secrets.DEPLOY_ENV_PORTFOLIO }}
          TUNNEL: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        shell: bash
        run: |
          mkdir -p ViajeChavales Gael-Games Portfolio infra/cloudflare-tunnel
          if [[ -n "${VIA}" ]]; then printf '%s\n' "${VIA}" > ViajeChavales/.env; chmod 600 ViajeChavales/.env; fi
          if [[ -n "${GAEL}" ]]; then printf '%s\n' "${GAEL}" > Gael-Games/.env; chmod 600 Gael-Games/.env; fi
          if [[ -n "${PORT}" ]]; then printf '%s\n' "${PORT}" > Portfolio/.env; chmod 600 Portfolio/.env; fi
          if [[ -n "${TUNNEL}" ]]; then printf '%s\n' "${TUNNEL}" > infra/cloudflare-tunnel/.env; chmod 600 infra/cloudflare-tunnel/.env; fi

      - name: Teardown existing PWs Docker stacks
        shell: bash
        run: |
          bash scripts/teardown-pws-docker.sh

  deploy-viajechavales:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.outputs.via_front == 'true' ||
      needs.detect-changes.outputs.via_back == 'true' ||
      needs.detect-changes.outputs.via_gateway == 'true' ||
      needs.detect-changes.outputs.via_stack == 'true' ||
      needs.detect-changes.outputs.via_tunnel == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write ViajeChavales .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_VIAJECHAVALES }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing Actions secret DEPLOY_ENV_VIAJECHAVALES (full ViajeChavales/.env body)." >&2
            exit 1
          fi
          mkdir -p ViajeChavales
          printf '%s\n' "$BODY" > ViajeChavales/.env
          chmod 600 ViajeChavales/.env

      - name: Write Cloudflare tunnel .env (for tunnel deploy step)
        if: needs.detect-changes.outputs.via_tunnel == 'true'
        env:
          BODY: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "via_tunnel=true but missing DEPLOY_ENV_CLOUDFLARE_TUNNEL." >&2
            exit 1
          fi
          mkdir -p infra/cloudflare-tunnel
          printf '%s\n' "$BODY" > infra/cloudflare-tunnel/.env
          chmod 600 infra/cloudflare-tunnel/.env

      - name: Validate deploy prerequisites
        run: |
          test -f ViajeChavales/.env || { echo "Missing ViajeChavales/.env"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy changed services only
        shell: bash
        run: |
          cd ViajeChavales

          if [[ "${{ needs.detect-changes.outputs.via_stack }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh all
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.via_back }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh backend
          fi

          if [[ "${{ needs.detect-changes.outputs.via_front }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh frontend
          fi

          if [[ "${{ needs.detect-changes.outputs.via_gateway }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh gateway
          fi

          if [[ "${{ needs.detect-changes.outputs.via_tunnel }}" == "true" ]]; then
            cd ..
            bash scripts/ensure-devogs-edge-network.sh
            bash scripts/deploy-cloudflare-tunnel.sh
          fi

      - name: Final status
        shell: bash
        run: |
          cd ViajeChavales
          docker compose --env-file .env ps
          docker ps -a --filter name=pws-cloudflared --format 'table {{.Names}}\t{{.Status}}' || true

  deploy-gael-games:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.outputs.gael_front == 'true' ||
      needs.detect-changes.outputs.gael_gateway == 'true' ||
      needs.detect-changes.outputs.gael_stack == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Gael-Games .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_GAEL_GAMES }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing Actions secret DEPLOY_ENV_GAEL_GAMES." >&2
            exit 1
          fi
          mkdir -p Gael-Games
          printf '%s\n' "$BODY" > Gael-Games/.env
          chmod 600 Gael-Games/.env

      - name: Validate deploy prerequisites
        run: |
          test -f Gael-Games/.env || { echo "Missing Gael-Games/.env"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy changed services only
        shell: bash
        run: |
          cd Gael-Games

          if [[ "${{ needs.detect-changes.outputs.gael_stack }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh all
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.gael_front }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh frontend
          fi

          if [[ "${{ needs.detect-changes.outputs.gael_gateway }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh gateway
          fi

      - name: Final status
        shell: bash
        run: |
          cd Gael-Games
          docker compose --env-file .env ps

  deploy-portfolio:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.outputs.port_front == 'true' ||
      needs.detect-changes.outputs.port_gateway == 'true' ||
      needs.detect-changes.outputs.port_stack == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Portfolio .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_PORTFOLIO }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing Actions secret DEPLOY_ENV_PORTFOLIO." >&2
            exit 1
          fi
          mkdir -p Portfolio
          printf '%s\n' "$BODY" > Portfolio/.env
          chmod 600 Portfolio/.env

      - name: Validate deploy prerequisites
        run: |
          test -f Portfolio/.env || { echo "Missing Portfolio/.env"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy changed services only
        shell: bash
        run: |
          cd Portfolio

          if [[ "${{ needs.detect-changes.outputs.port_stack }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh all
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.port_front }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh frontend
          fi

          if [[ "${{ needs.detect-changes.outputs.port_gateway }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh gateway
          fi

      - name: Final status
        shell: bash
        run: |
          cd Portfolio
          docker compose --env-file .env ps

  refresh-shared-tunnel-for-gael:
    needs: detect-changes
    if: needs.detect-changes.outputs.gael_tunnel == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Cloudflare tunnel .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing DEPLOY_ENV_CLOUDFLARE_TUNNEL for tunnel refresh job." >&2
            exit 1
          fi
          mkdir -p infra/cloudflare-tunnel
          printf '%s\n' "$BODY" > infra/cloudflare-tunnel/.env
          chmod 600 infra/cloudflare-tunnel/.env

      - name: Deploy shared Cloudflare tunnel
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh
          bash scripts/deploy-cloudflare-tunnel.sh
