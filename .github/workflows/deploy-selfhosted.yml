# Self-hosted deploy: after checkout, .env files are created from repo Secrets (not committed).
#
# Create these in GitHub → Settings → Secrets and variables → Actions → Secrets:
#
#   DEPLOY_ENV_VIAJECHAVALES
#     Full file content for ViajeChavales/.env (see ViajeChavales/.env.example).
#     Must include: APP_PORT, POSTGRES_*, JWT_*, optional CLOUDFLARE_PUBLIC_HOSTNAME.
#
#   DEPLOY_ENV_GAEL_GAMES
#     Full file for Gael-Games/.env (APP_PORT, CLOUDFLARE_PUBLIC_HOSTNAME).
#
#   DEPLOY_ENV_PORTFOLIO
#     Full file for Portfolio/.env (APP_PORT, CLOUDFLARE_PUBLIC_HOSTNAME,
#     PUBLIC_ABSTRACT_EMAIL_REPUTATION_API_KEY if you use that build-arg).
#
#   DEPLOY_ENV_CLOUDFLARE_TUNNEL
#     Full file for infra/cloudflare-tunnel/.env — typically one line:
#     CLOUDFLARED_TUNNEL_TOKEN=...
#
# Jobs that run deploy-cloudflare-tunnel.sh need DEPLOY_ENV_CLOUDFLARE_TUNNEL set.
#
# --- Greenfield / full redeploy (servidor virgen o reinicio completo) ---
# Acción recomendada: Run workflow → rama main → activar solo "Bootstrap all apps + tunnel".
#   Ese input ejecuta primero teardown-selfhosted (limpia stacks Docker del host) y luego
#   bootstrap-selfhosted (scripts/init-and-deploy-all.sh: tres apps, infra/ingress, túnel).
# Requisitos: runner self-hosted en línea con etiquetas self-hosted, Linux, X64; Docker disponible
#   para el usuario del runner; secretos DEPLOY_ENV_VIAJECHAVALES, DEPLOY_ENV_GAEL_GAMES,
#   DEPLOY_ENV_PORTFOLIO, DEPLOY_ENV_CLOUDFLARE_TUNNEL definidos y no vacíos.
# Tras un run OK, en la UI verás muchos jobs en Skipped y bootstrap-selfhosted en Success — es esperado.
# Sin GitHub Actions: clonar el repo en el servidor, colocar los cuatro .env en las rutas esperadas
#   (ver scripts/GREENFIELD.md) y ejecutar: bash scripts/init-and-deploy-all.sh
#
# workflow_dispatch: full_stack_deploy corre teardown + bootstrap; path-based deploy jobs se omiten.
#
# Diagnosing "all jobs cancelled" / nothing runs on self-hosted:
# - Skipped: expected when full_stack_deploy is true — deploy-viajechavales, deploy-gael-games,
#   deploy-portfolio, deploy-ingress require full_stack_deploy != true. teardown-selfhosted runs first
#   (greenfield). refresh-shared-tunnel-after-deploy does not run after bootstrap-only.
# - Cancelled: user cancelled the run, or jobs were abandoned after staying queued.
# - Queued (spinner): no runner picked up the job — ensure a runner is online with labels exactly
#   self-hosted, Linux, X64 (see runs-on on teardown, deploy, bootstrap jobs).
# - Failure: open the failed job log; bootstrap exits 1 if any of the four DEPLOY_ENV_* secrets below is empty.
# - Dispatch inputs / defaults apply only to the commit GitHub ran — confirm the run’s commit SHA and
#   that "Bootstrap all apps + tunnel" was enabled (or defaults were true on that revision).
#
# After at least one path-based app or ingress deploy succeeds, refresh-shared-tunnel-after-deploy
# reruns the shared Cloudflare connector (bootstrap already deploys the tunnel once via init-and-deploy-all).
# Shared HTTP ingress: infra/ingress (devogs-ingress); Trips-only gateway: ViajeChavales (trips-gateway).

name: Deploy Changed Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_teardown:
        description: "Teardown Docker stacks only (no bootstrap). Redundant if Bootstrap all is enabled — that path already tears down first."
        required: false
        type: boolean
        default: false
      refresh_tunnel:
        description: "Refresh shared Cloudflare tunnel connector (cloudflared)"
        required: false
        type: boolean
        default: false
      full_stack_deploy:
        description: "Greenfield / full redeploy — teardown then all apps + shared ingress + Cloudflare tunnel (init-and-deploy-all). Other deploy jobs stay Skipped."
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      via_front: ${{ steps.filter.outputs.via_front }}
      via_back: ${{ steps.filter.outputs.via_back }}
      via_gateway: ${{ steps.filter.outputs.via_gateway }}
      via_stack: ${{ steps.filter.outputs.via_stack }}
      via_tunnel: ${{ steps.filter.outputs.via_tunnel }}
      gael_front: ${{ steps.filter.outputs.gael_front }}
      gael_gateway: ${{ steps.filter.outputs.gael_gateway }}
      gael_stack: ${{ steps.filter.outputs.gael_stack }}
      port_front: ${{ steps.filter.outputs.port_front }}
      port_gateway: ${{ steps.filter.outputs.port_gateway }}
      port_stack: ${{ steps.filter.outputs.port_stack }}
      ingress_stack: ${{ steps.filter.outputs.ingress_stack }}
      infra_critical: ${{ steps.filter.outputs.infra_critical }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_dispatch has no `before` in the payload; compare HEAD to its parent so the whole
          # tree is not treated as newly added (needs depth ≥ 2). Push keeps shallow checkout.
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 2 || 1 }}

      # paths-filter passes `base` to `git fetch origin <base> …`; symbolic refs like HEAD~1 are invalid
      # refspecs for fetch — use the resolved parent commit SHA instead.
      - name: Resolve path-filter base (workflow_dispatch)
        id: path_parent
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'workflow_dispatch' && steps.path_parent.outputs.sha || github.event.before }}
          filters: |
            infra_critical:
              - 'ViajeChavales/docker-compose.yml'
              - 'ViajeChavales/infra/nginx/**'
              - 'ViajeChavales/scripts/**'
              - 'Gael-Games/docker-compose.yml'
              - 'Gael-Games/infra/nginx/**'
              - 'Gael-Games/scripts/**'
              - 'Portfolio/docker-compose.yml'
              - 'Portfolio/infra/nginx/**'
              - 'Portfolio/scripts/**'
              - 'infra/cloudflare-tunnel/**'
              - 'scripts/ensure-devogs-edge-network.*'
              - 'scripts/deploy-cloudflare-tunnel.*'
              - 'scripts/teardown-pws-docker.*'
              - 'infra/ingress/**'
            ingress_stack:
              - 'infra/ingress/**'
              - 'landing/**'
            via_front:
              - 'ViajeChavales/viaje-chavales-front/**'
            via_back:
              - 'ViajeChavales/viaje-chavales-back/**'
            via_gateway:
              - 'ViajeChavales/infra/nginx/**'
            via_stack:
              - 'ViajeChavales/docker-compose.yml'
              - 'ViajeChavales/scripts/**'
            via_tunnel:
              - 'ViajeChavales/docs/cloudflare-tunnel.md'
              - 'ViajeChavales/docs/deployment.md'
              - 'infra/cloudflare-tunnel/**'
              - 'scripts/deploy-cloudflare-tunnel.sh'
              - 'scripts/deploy-cloudflare-tunnel.ps1'
              - 'scripts/ensure-devogs-edge-network.sh'
              - 'scripts/ensure-devogs-edge-network.ps1'
            gael_front:
              - 'Gael-Games/src/**'
              - 'Gael-Games/public/**'
              - 'Gael-Games/index.html'
              - 'Gael-Games/package.json'
              - 'Gael-Games/package-lock.json'
              - 'Gael-Games/vite.config.js'
            gael_gateway:
              - 'Gael-Games/infra/nginx/**'
            gael_stack:
              - 'Gael-Games/docker-compose.yml'
              - 'Gael-Games/Dockerfile.frontend'
              - 'Gael-Games/.env.example'
              - 'Gael-Games/init-app'
              - 'Gael-Games/init-app.ps1'
              - 'Gael-Games/scripts/**'
            port_front:
              - 'Portfolio/src/**'
              - 'Portfolio/public/**'
              - 'Portfolio/package.json'
              - 'Portfolio/package-lock.json'
              - 'Portfolio/astro.config.mjs'
              - 'Portfolio/tailwind.config.mjs'
              - 'Portfolio/tsconfig.json'
            port_gateway:
              - 'Portfolio/infra/nginx/**'
            port_stack:
              - 'Portfolio/docker-compose.yml'
              - 'Portfolio/Dockerfile'
              - 'Portfolio/.env.example'
              - 'Portfolio/init-app'
              - 'Portfolio/init-app.ps1'
              - 'Portfolio/scripts/**'

  # workflow_dispatch: Force teardown only, OR full_stack_deploy (greenfield: teardown then bootstrap).
  # push: infra-critical paths changed. Deploy jobs use needs + if(success||skipped) when skipped.
  teardown-selfhosted:
    needs: detect-changes
    if: |
      (github.event_name == 'workflow_dispatch' && (
        inputs.force_teardown == true || inputs.force_teardown == 'true' ||
        inputs.full_stack_deploy == true || inputs.full_stack_deploy == 'true'
      )) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.infra_critical == 'true')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env files from secrets (for teardown)
        env:
          VIA: ${{ secrets.DEPLOY_ENV_VIAJECHAVALES }}
          GAEL: ${{ secrets.DEPLOY_ENV_GAEL_GAMES }}
          PORT: ${{ secrets.DEPLOY_ENV_PORTFOLIO }}
          TUNNEL: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        shell: bash
        run: |
          mkdir -p ViajeChavales Gael-Games Portfolio infra/cloudflare-tunnel
          if [[ -n "${VIA}" ]]; then printf '%s\n' "${VIA}" > ViajeChavales/.env; chmod 600 ViajeChavales/.env; fi
          if [[ -n "${GAEL}" ]]; then printf '%s\n' "${GAEL}" > Gael-Games/.env; chmod 600 Gael-Games/.env; fi
          if [[ -n "${PORT}" ]]; then printf '%s\n' "${PORT}" > Portfolio/.env; chmod 600 Portfolio/.env; fi
          if [[ -n "${TUNNEL}" ]]; then printf '%s\n' "${TUNNEL}" > infra/cloudflare-tunnel/.env; chmod 600 infra/cloudflare-tunnel/.env; fi

      - name: Teardown existing PWs Docker stacks
        shell: bash
        run: |
          bash scripts/teardown-pws-docker.sh

      - name: Teardown complete
        run: echo "teardown-selfhosted finished"

  deploy-viajechavales:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.result == 'success' &&
      (needs.teardown-selfhosted.result == 'success' || needs.teardown-selfhosted.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || (inputs.full_stack_deploy != true && inputs.full_stack_deploy != 'true')) &&
      (needs.detect-changes.outputs.via_front == 'true' ||
      needs.detect-changes.outputs.via_back == 'true' ||
      needs.detect-changes.outputs.via_gateway == 'true' ||
      needs.detect-changes.outputs.via_stack == 'true' ||
      needs.detect-changes.outputs.via_tunnel == 'true')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write ViajeChavales .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_VIAJECHAVALES }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing Actions secret DEPLOY_ENV_VIAJECHAVALES (full ViajeChavales/.env body)." >&2
            exit 1
          fi
          mkdir -p ViajeChavales
          printf '%s\n' "$BODY" > ViajeChavales/.env
          chmod 600 ViajeChavales/.env

      - name: Write Cloudflare tunnel .env (for tunnel deploy step)
        if: needs.detect-changes.outputs.via_tunnel == 'true'
        env:
          BODY: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "via_tunnel=true but missing DEPLOY_ENV_CLOUDFLARE_TUNNEL." >&2
            exit 1
          fi
          mkdir -p infra/cloudflare-tunnel
          printf '%s\n' "$BODY" > infra/cloudflare-tunnel/.env
          chmod 600 infra/cloudflare-tunnel/.env

      - name: Validate deploy prerequisites
        run: |
          test -f ViajeChavales/.env || { echo "Missing ViajeChavales/.env"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy changed services only
        shell: bash
        run: |
          cd ViajeChavales

          if [[ "${{ needs.detect-changes.outputs.via_stack }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh all
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.via_back }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh backend
          fi

          if [[ "${{ needs.detect-changes.outputs.via_front }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh frontend
          fi

          if [[ "${{ needs.detect-changes.outputs.via_gateway }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh gateway
          fi

          if [[ "${{ needs.detect-changes.outputs.via_tunnel }}" == "true" ]]; then
            cd ..
            bash scripts/ensure-devogs-edge-network.sh
            bash scripts/deploy-cloudflare-tunnel.sh
          fi

      - name: Final status
        shell: bash
        run: |
          cd ViajeChavales
          docker compose --env-file .env ps
          docker ps -a --filter name=pws-cloudflared --format 'table {{.Names}}\t{{.Status}}' || true

  deploy-gael-games:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.result == 'success' &&
      (needs.teardown-selfhosted.result == 'success' || needs.teardown-selfhosted.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || (inputs.full_stack_deploy != true && inputs.full_stack_deploy != 'true')) &&
      (needs.detect-changes.outputs.gael_front == 'true' ||
      needs.detect-changes.outputs.gael_gateway == 'true' ||
      needs.detect-changes.outputs.gael_stack == 'true')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Gael-Games .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_GAEL_GAMES }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing Actions secret DEPLOY_ENV_GAEL_GAMES." >&2
            exit 1
          fi
          mkdir -p Gael-Games
          printf '%s\n' "$BODY" > Gael-Games/.env
          chmod 600 Gael-Games/.env

      - name: Validate deploy prerequisites
        run: |
          test -f Gael-Games/.env || { echo "Missing Gael-Games/.env"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy changed services only
        shell: bash
        run: |
          cd Gael-Games

          if [[ "${{ needs.detect-changes.outputs.gael_stack }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh all
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.gael_front }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh frontend
          fi

          if [[ "${{ needs.detect-changes.outputs.gael_gateway }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh gateway
          fi

      - name: Final status
        shell: bash
        run: |
          cd Gael-Games
          docker compose --env-file .env ps

  deploy-portfolio:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.result == 'success' &&
      (needs.teardown-selfhosted.result == 'success' || needs.teardown-selfhosted.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || (inputs.full_stack_deploy != true && inputs.full_stack_deploy != 'true')) &&
      (needs.detect-changes.outputs.port_front == 'true' ||
      needs.detect-changes.outputs.port_gateway == 'true' ||
      needs.detect-changes.outputs.port_stack == 'true')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Portfolio .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_PORTFOLIO }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing Actions secret DEPLOY_ENV_PORTFOLIO." >&2
            exit 1
          fi
          mkdir -p Portfolio
          printf '%s\n' "$BODY" > Portfolio/.env
          chmod 600 Portfolio/.env

      - name: Validate deploy prerequisites
        run: |
          test -f Portfolio/.env || { echo "Missing Portfolio/.env"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy changed services only
        shell: bash
        run: |
          cd Portfolio

          if [[ "${{ needs.detect-changes.outputs.port_stack }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh all
            exit 0
          fi

          if [[ "${{ needs.detect-changes.outputs.port_front }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh frontend
          fi

          if [[ "${{ needs.detect-changes.outputs.port_gateway }}" == "true" ]]; then
            bash ./scripts/deploy-part.sh gateway
          fi

      - name: Final status
        shell: bash
        run: |
          cd Portfolio
          docker compose --env-file .env ps

  deploy-ingress:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.result == 'success' &&
      (needs.teardown-selfhosted.result == 'success' || needs.teardown-selfhosted.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || (inputs.full_stack_deploy != true && inputs.full_stack_deploy != 'true')) &&
      needs.detect-changes.outputs.ingress_stack == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy prerequisites
        run: command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Ensure shared Docker network
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh

      - name: Deploy shared ingress
        shell: bash
        run: |
          bash infra/ingress/up.sh

      - name: Final status
        shell: bash
        run: docker compose -f infra/ingress/docker-compose.yml ps

  # New runner / empty host: run once after secrets are set. Skips path-based deploy jobs.
  bootstrap-selfhosted:
    needs:
      - detect-changes
      - teardown-selfhosted
    if: |
      needs.detect-changes.result == 'success' &&
      (needs.teardown-selfhosted.result == 'success' || needs.teardown-selfhosted.result == 'skipped') &&
      github.event_name == 'workflow_dispatch' &&
      (inputs.full_stack_deploy == true || inputs.full_stack_deploy == 'true')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write all .env files from secrets
        env:
          VIA: ${{ secrets.DEPLOY_ENV_VIAJECHAVALES }}
          GAEL: ${{ secrets.DEPLOY_ENV_GAEL_GAMES }}
          PORT: ${{ secrets.DEPLOY_ENV_PORTFOLIO }}
          TUNNEL: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        shell: bash
        run: |
          if [[ -z "${VIA}" || -z "${GAEL}" || -z "${PORT}" || -z "${TUNNEL}" ]]; then
            echo "full_stack_deploy requires all four secrets: DEPLOY_ENV_VIAJECHAVALES, DEPLOY_ENV_GAEL_GAMES, DEPLOY_ENV_PORTFOLIO, DEPLOY_ENV_CLOUDFLARE_TUNNEL." >&2
            exit 1
          fi
          mkdir -p ViajeChavales Gael-Games Portfolio infra/cloudflare-tunnel
          printf '%s\n' "${VIA}" > ViajeChavales/.env
          chmod 600 ViajeChavales/.env
          printf '%s\n' "${GAEL}" > Gael-Games/.env
          chmod 600 Gael-Games/.env
          printf '%s\n' "${PORT}" > Portfolio/.env
          chmod 600 Portfolio/.env
          printf '%s\n' "${TUNNEL}" > infra/cloudflare-tunnel/.env
          chmod 600 infra/cloudflare-tunnel/.env

      - name: Validate deploy prerequisites
        run: |
          command -v docker >/dev/null 2>&1 || { echo "docker not found"; exit 1; }

      - name: Full stack bootstrap (apps + tunnel)
        shell: bash
        run: |
          bash scripts/init-and-deploy-all.sh

  # Runs after path-based deploy jobs when at least one succeeded (not after bootstrap-only: init
  # already deploys the tunnel). Uses always() so a failed sibling deploy does not block this job.
  refresh-shared-tunnel-after-deploy:
    needs:
      - detect-changes
      - teardown-selfhosted
      - deploy-viajechavales
      - deploy-gael-games
      - deploy-portfolio
      - deploy-ingress
      - bootstrap-selfhosted
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.teardown-selfhosted.result == 'success' || needs.teardown-selfhosted.result == 'skipped') &&
      (needs.deploy-ingress.result == 'success' || needs.deploy-ingress.result == 'skipped') &&
      (
        needs.deploy-viajechavales.result == 'success' ||
        needs.deploy-gael-games.result == 'success' ||
        needs.deploy-portfolio.result == 'success' ||
        needs.deploy-ingress.result == 'success'
      )
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Cloudflare tunnel .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing DEPLOY_ENV_CLOUDFLARE_TUNNEL for tunnel refresh after deploy." >&2
            exit 1
          fi
          mkdir -p infra/cloudflare-tunnel
          printf '%s\n' "$BODY" > infra/cloudflare-tunnel/.env
          chmod 600 infra/cloudflare-tunnel/.env

      - name: Deploy shared Cloudflare tunnel
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh
          bash scripts/deploy-cloudflare-tunnel.sh

  # Manual: tunnel only (no app deploy). Path deploys also run refresh-shared-tunnel-after-deploy.
  refresh-shared-tunnel:
    if: github.event_name == 'workflow_dispatch' && (inputs.refresh_tunnel == true || inputs.refresh_tunnel == 'true') && (inputs.full_stack_deploy != true && inputs.full_stack_deploy != 'true')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Cloudflare tunnel .env from secret
        env:
          BODY: ${{ secrets.DEPLOY_ENV_CLOUDFLARE_TUNNEL }}
        run: |
          if [[ -z "${BODY}" ]]; then
            echo "Missing DEPLOY_ENV_CLOUDFLARE_TUNNEL for tunnel refresh job." >&2
            exit 1
          fi
          mkdir -p infra/cloudflare-tunnel
          printf '%s\n' "$BODY" > infra/cloudflare-tunnel/.env
          chmod 600 infra/cloudflare-tunnel/.env

      - name: Deploy shared Cloudflare tunnel
        shell: bash
        run: |
          bash scripts/ensure-devogs-edge-network.sh
          bash scripts/deploy-cloudflare-tunnel.sh
