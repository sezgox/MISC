services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-viajechavales}
      POSTGRES_USER: ${POSTGRES_USER:-viajechavales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-viajechavales} -d ${POSTGRES_DB:-viajechavales}
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./viaje-chavales-back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-viajechavales}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-viajechavales}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-ViajeChavales}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ViajeChavalesUsers}
    expose:
      - "3000"

  frontend:
    build:
      context: ./viaje-chavales-front
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 4000
      INTERNAL_API_URL: http://backend:3000
    expose:
      - "4000"

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_PORT:-8091}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../landing:/usr/share/nginx/html/landing:ro

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    depends_on:
      - gateway
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARED_TUNNEL_TOKEN:-}
    profiles:
      - cloudflare

volumes:
  postgres_data:
