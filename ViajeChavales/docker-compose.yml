services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-viajechavales}
      POSTGRES_USER: ${POSTGRES_USER:-viajechavales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-viajechavales} -d ${POSTGRES_DB:-viajechavales}
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./viaje-chavales-back
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-viajechavales}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-viajechavales}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-ViajeChavales}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ViajeChavalesUsers}
    expose:
      - "3000"

  frontend:
    build:
      context: ./viaje-chavales-front
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 4000
      INTERNAL_API_URL: http://backend:3000
    expose:
      - "4000"

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_PORT:-8091}:80"
    volumes:
      - ./infra/nginx/trips-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
      devogs_edge:
        aliases:
          - trips-gateway

networks:
  devogs_edge:
    external: true
    name: devogs_edge

volumes:
  postgres_data:
