map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name www.devogs.com;

  return 308 https://devogs.com/;
}

server {
  listen 80;
  server_name devogs.com;

  root /usr/share/nginx/html/landing;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri @landing_root;
  }

  location @landing_root {
    return 308 https://devogs.com/;
  }
}

server {
  listen 80 default_server;
  server_name trips.devogs.com;

  client_max_body_size 10m;
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $frontend_upstream frontend:4000;
  set $backend_upstream backend:3000;

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://$backend_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://$backend_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location / {
    proxy_pass http://$frontend_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

