services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${INGRESS_PORT:-8090}:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../landing:/usr/share/nginx/html/landing:ro
    networks:
      devogs_edge:
        aliases:
          - devogs-ingress

networks:
  devogs_edge:
    external: true
    name: devogs_edge
